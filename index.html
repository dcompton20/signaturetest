<!DOCTYPE html>
<html>
<head>
  <title>Signature Capture</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #cnv { border: 1px solid #000; cursor: crosshair; }
    button { margin: 10px 5px 10px 0; padding: 8px 16px; cursor: pointer; }
    #status { margin-top: 10px; font-weight: bold; }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      text-align: center;
    }
    .modal h3 { margin-top: 0; }
    .modal canvas {
      border: 2px solid #333;
      border-radius: 4px;
      cursor: crosshair;
      display: block;
      margin: 10px auto;
      touch-action: none;
    }
    .modal button { margin: 5px; padding: 8px 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Signature Capture</h2>
  <canvas id="cnv" width="400" height="100" style="border:1px solid #000;"></canvas>
  <br><br>
  <button onclick="openSignatureModal()">Request Customer Signature</button>
  <button onclick="clearPreview()">Clear</button>
  <button onclick="postSignature('data:image/jpeg;base64,test123')">Test API</button>
  <p id="status"></p>

  <!-- Signature Modal -->
  <div class="modal-overlay" id="sigModal">
    <div class="modal">
      <h3>Sign Below</h3>
      <canvas id="sigCanvas" width="500" height="200"></canvas>
      <br>
      <button onclick="clearModal()">Clear</button>
      <button onclick="cancelModal()">Cancel</button>
      <button onclick="acceptSignature()" style="background:#4CAF50;color:#fff;">Accept</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get('ticketId');

    // --- Modal drawing logic ---
    const sigCanvas = document.getElementById('sigCanvas');
    const sigCtx = sigCanvas.getContext('2d');
    let drawing = false;

    sigCtx.lineWidth = 2;
    sigCtx.lineCap = 'round';
    sigCtx.strokeStyle = '#000';

    function getPos(e) {
      const rect = sigCanvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    sigCanvas.addEventListener('mousedown', (e) => {
      drawing = true;
      const pos = getPos(e);
      sigCtx.beginPath();
      sigCtx.moveTo(pos.x, pos.y);
    });
    sigCanvas.addEventListener('mousemove', (e) => {
      if (!drawing) return;
      const pos = getPos(e);
      sigCtx.lineTo(pos.x, pos.y);
      sigCtx.stroke();
    });
    sigCanvas.addEventListener('mouseup', () => drawing = false);
    sigCanvas.addEventListener('mouseleave', () => drawing = false);

    // Touch support
    sigCanvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      drawing = true;
      const pos = getPos(e);
      sigCtx.beginPath();
      sigCtx.moveTo(pos.x, pos.y);
    });
    sigCanvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!drawing) return;
      const pos = getPos(e);
      sigCtx.lineTo(pos.x, pos.y);
      sigCtx.stroke();
    });
    sigCanvas.addEventListener('touchend', () => drawing = false);

    // --- Modal controls ---
    function openSignatureModal() {
      clearModal();
      document.getElementById('sigModal').classList.add('active');
      document.getElementById('status').innerText = 'Waiting for customer to sign...';
    }

    function clearModal() {
      sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
    }

    function cancelModal() {
      document.getElementById('sigModal').classList.remove('active');
      document.getElementById('status').innerText = '';
    }

    function acceptSignature() {
      // Convert modal canvas to base64 JPEG
      const dataUrl = sigCanvas.toDataURL('image/jpeg');
      document.getElementById('sigModal').classList.remove('active');

      // Copy to preview canvas
      const preview = document.getElementById('cnv');
      const previewCtx = preview.getContext('2d');
      const img = new Image();
      img.onload = function() {
        previewCtx.clearRect(0, 0, preview.width, preview.height);
        previewCtx.drawImage(img, 0, 0, preview.width, preview.height);
      };
      img.src = dataUrl;

      // Submit to API
      document.getElementById('status').innerText = 'Submitting...';
      postSignature(dataUrl);
    }

    function clearPreview() {
      const preview = document.getElementById('cnv');
      preview.getContext('2d').clearRect(0, 0, preview.width, preview.height);
      document.getElementById('status').innerText = '';
    }

    // --- API submission (unchanged) ---
    async function postSignature(base64sig) {
      try {
        const tokenRes = await fetch('https://davidaugust25.haloitsm.com/auth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'grant_type=client_credentials&client_id=6a75f8ce-80a3-4e56-a7aa-c2fb0f9b63c2&client_secret=7HPbzLtXV86Gy2JSTv4guPoalReZDH9_N4A_A_8Ul_g&scope=all'
        });
        const tokenData = await tokenRes.json();
        console.log(tokenData);
        const token = tokenData.access_token;
        const res = await fetch('https://davidaugust25.haloitsm.com/api/tickets/' + ticketId, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            id: parseInt(ticketId),
            new_customer_signature: base64sig,
            utcoffset: 240,
            _refreshresponse: true
          })
        });
        if (res.ok) {
          document.getElementById('status').innerText = '✅ Signature saved!';
        } else {
          const err = await res.text();
          document.getElementById('status').innerText = '❌ Error: ' + err;
        }
      } catch(e) {
        document.getElementById('status').innerText = '❌ Failed: ' + e.message;
      }
    }
  </script>
</body>
</html>
